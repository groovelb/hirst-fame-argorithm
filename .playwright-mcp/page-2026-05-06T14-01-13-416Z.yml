          - generic [ref=e569]: "The domain of beauty, sublimation, and sacred geometry. Veils, Cherry Blossoms, Mandalas, and Sacred Heart reside here. Coordinates of this band: a return from delegated authorship to the hand, explicit citation of mono no aware, and traversal of Catholic and Buddhist iconographies. The painting period (2018–) carries Bonnard's and Seurat's pointillism into the 21st century — a self-critique after the Diamond Skull and a recovery of hand and time."
