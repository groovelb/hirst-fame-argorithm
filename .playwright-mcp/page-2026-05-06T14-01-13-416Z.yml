          - heading "1903, Daugavpils — 1970, New York" [level=6]
          - paragraph: Born Bristol, England (1965). Core artist of the YBA (Young British Artists) generation, studied under Michael Craig-Martin at Goldsmiths. Emerging via the 1988 Freeze exhibition (which he curated himself), Hirst has moved through formaldehyde Natural History vitrines, Medicine Cabinets, Spot Paintings, the Diamond Skull, and into his current painting and NFT work — traversing five axes (Mortality, System, Faith, Value, Form) to become the most contested and canonized artist of 21st-century art.
