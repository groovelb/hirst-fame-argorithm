        - generic:
          - heading "HOW DID HE BECOME THE SYSTEM?" [level=2]
          - paragraph: In 1988 a Goldsmiths student curated his own warehouse show called Freeze. Saatchi, Norman Rosenthal and Nicholas Serota came. Thirty years later, he is not an artist anymore. He is the system.
      - generic:
        - generic:
          - img
          - heading "DEATH" [level=2]
          - paragraph: 1991 — Saatchi commissions a four-metre tiger shark for £50,000. 1993 — a cow split in two, suspended in formaldehyde. Put death inside a vitrine, and the museum has to buy it. The first trophy was a corpse.
      - generic:
        - generic:
          - img
          - heading "PRICE" [level=2]
          - paragraph: "2007 — 8,601 flawless diamonds set into a platinum skull. Reported sale: £50M. 2008 — 218 brand-new works straight to Sotheby's. The auction opened the day Lehman Brothers fell. Now the price is the work."
      - generic:
        - generic:
          - img
          - heading "GRID" [level=2]
          - paragraph: The spot paintings are not painted by Hirst. His assistants paint them. From a single wall in Goldsmiths (1986) to eleven Gagosian galleries firing on the same day (2012), while Tate Modern drew 463,000 visitors. Once the hand disappears, the name becomes a system.
      - generic:
        - generic:
          - img
          - heading "BURN" [level=2]
          - paragraph: 2017 — Venice. Ten years building treasures from a shipwreck. Critics sink them. 2021 — 10,000 spot paintings paired one-to-one with NFTs. Twelve months to choose. 4,851 canvases were thrown into the fire by his own hand. The artwork now kills the artwork.
      - generic:
        - generic:
          - heading "INDEX" [level=2]
          - paragraph: From here on we no longer look at works. We look at the search graph that built them. Thirty years of peaks, in chronological order.
